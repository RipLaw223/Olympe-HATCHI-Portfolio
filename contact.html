<script>
(function(){
  var canvas=document.getElementById('stars-canvas');
  var ctx=canvas.getContext('2d');
  var W,H,stars=[],nebulas=[],consts=[];
  var N=200,NEB=3,NC=4;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  function isDark(){return document.documentElement.getAttribute('data-theme')==='dark';}
  function mkStar(){var d=isDark();var c=d?(Math.random()>.85?'#c8a96e':Math.random()>.7?'#7b9cff':'rgba(255,255,255,0.9)'):(Math.random()>.85?'#9a6e2a':Math.random()>.7?'#3a5fcc':'rgba(0,0,0,0.7)');return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,alpha:Math.random()*.8+.2,speed:Math.random()*.25+.05,ts:Math.random()*.02+.005,td:Math.random()>.5?1:-1,color:c};}
  function mkNeb(){var d=isDark();return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*180+80,alpha:d?Math.random()*.06+.02:Math.random()*.04+.01,color:d?(Math.random()>.5?'rgba(123,156,255,':'rgba(200,169,110,'):(Math.random()>.5?'rgba(58,95,204,':'rgba(154,110,42,')};}
  function mkConst(){var d=isDark();var cx=Math.random()*W,cy=Math.random()*H,nb=Math.floor(Math.random()*4)+3;var pts=Array.from({length:nb},function(){return{x:cx+(Math.random()-.5)*220,y:cy+(Math.random()-.5)*220,r:Math.random()*.8+1};});var lk=[];for(var i=1;i<pts.length;i++)lk.push([i-1,i]);if(pts.length>3&&Math.random()>.5)lk.push([0,Math.floor(Math.random()*(pts.length-2))+1]);return{pts:pts,lk:lk,alpha:0,ta:d?Math.random()*.25+.08:Math.random()*.18+.05,fs:Math.random()*.003+.001,fd:1,color:d?(Math.random()>.6?'#c8a96e':'#7b9cff'):(Math.random()>.6?'#9a6e2a':'#3a5fcc')};}
  function init(){resize();stars=Array.from({length:N},mkStar);nebulas=Array.from({length:NEB},mkNeb);consts=Array.from({length:NC},mkConst);}
  function drawC(){consts.forEach(function(c){c.alpha+=c.fs*c.fd;if(c.alpha>=c.ta)c.fd=-1;if(c.alpha<=0){Object.assign(c,mkConst());c.alpha=0;c.fd=1;return;}ctx.globalAlpha=c.alpha*.6;ctx.strokeStyle=c.color;ctx.lineWidth=0.5;c.lk.forEach(function(l){ctx.beginPath();ctx.moveTo(c.pts[l[0]].x,c.pts[l[0]].y);ctx.lineTo(c.pts[l[1]].x,c.pts[l[1]].y);ctx.stroke();});ctx.globalAlpha=c.alpha;c.pts.forEach(function(p){ctx.fillStyle=c.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});});}
  function draw(){ctx.clearRect(0,0,W,H);nebulas.forEach(function(n){var g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,n.color+n.alpha+')');g.addColorStop(1,n.color+'0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();});drawC();stars.forEach(function(s){s.alpha+=s.ts*s.td;if(s.alpha>=1||s.alpha<=.1)s.td*=-1;s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}ctx.globalAlpha=s.alpha;ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;requestAnimationFrame(draw);}
  window.addEventListener('resize',function(){resize();nebulas=Array.from({length:NEB},mkNeb);consts=Array.from({length:NC},mkConst);});
  window.__regenStars=function(){stars=Array.from({length:N},mkStar);nebulas=Array.from({length:NEB},mkNeb);consts=Array.from({length:NC},mkConst);};
  init();draw();
})();
</script>
